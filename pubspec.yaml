name: navieu
description: "Privacy-First Offline Navigation Intelligence for Europe"
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_map: ^7.0.0
  maplibre_gl: ^0.20.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^12.0.0
  sensors_plus: ^5.0.1
  flutter_compass: ^0.8.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.3
  path: ^1.9.0
  collection: ^1.18.0
  async: ^2.11.0
  intl: ^0.19.0
  slang: ^3.31.0
  slang_flutter: ^3.31.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4
  drift_dev: ^2.18.0
  hive_generator: ^2.0.1
  slang_build_runner: ^3.31.0
  mockito: ^5.4.4
  build_verify: ^3.1.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/voices/
    - assets/styles/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700